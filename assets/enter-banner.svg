<svg xmlns="http://www.w3.org/2000/svg" width="680" height="160" viewBox="0 0 680 160" role="img" aria-label="DiskusMS">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff1744"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#00ff9d"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="680" height="160" rx="12" fill="#030304" stroke="url(#g)" stroke-width="2"/>

  <!-- grid -->
  <g opacity="0.18" stroke="#00ff9d" stroke-width="0.6">
    <path d="M40 20 H640 M40 50 H640 M40 80 H640 M40 110 H640 M40 140 H640"/>
    <path d="M40 20 V140 M100 20 V140 M160 20 V140 M220 20 V140 M280 20 V140 M340 20 V140 M400 20 V140 M460 20 V140 M520 20 V140 M580 20 V140 M640 20 V140"/>
  </g>

  <rect x="0" y="0" width="680" height="160" fill="url(#scan)">
    <animate attributeName="y" values="-160;160" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <text x="48" y="58" fill="#ff1744" font-family="Consolas, Monaco, monospace" font-size="13" letter-spacing="3">REBEL / SOUND</text>
  <text x="48" y="92" fill="#eaeaf0" font-family="Impact, Haettenschweiler, sans-serif" font-size="42" letter-spacing="4">DISKUS(MS)</text>
  <text x="48" y="124" fill="#00ff9d" font-family="Consolas, Monaco, monospace" font-size="14" letter-spacing="2">HACK / BUILD  ·  VIBE CODING  ·  AI ONLINE</text>

  <!-- pulse orb -->
  <circle cx="600" cy="80" r="18" fill="none" stroke="#8b5cf6" stroke-width="2">
    <animate attributeName="r" values="14;26;14" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0.25;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="80" r="8" fill="#8b5cf6">
    <animate attributeName="opacity" values="1;0.5;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
